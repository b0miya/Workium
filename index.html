<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부서업무관리 시스템</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- 로딩 오버레이 -->
<div id="loadingOverlay">
  <div style="text-align:center">
    <div class="spinner"></div>
    <p style="margin-top:14px;color:#64748b;font-size:14px">데이터 불러오는 중...</p>
  </div>
</div>

<div class="app">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span>부서업무관리</span>
      </div>
    </div>

    <div class="sidebar-section-label">전체</div>
    <button class="nav-member active" data-id="all" onclick="selectView('all')">
      <div class="avatar-circle all-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </div>
      <span>전체 보기</span>
    </button>

    <div class="sidebar-section-label">부서원</div>
    <div id="memberNavList"></div>

    <div class="sidebar-bottom">
      <!-- 현재 접속자 표시 -->
      <div class="current-user" id="currentUserBox" onclick="openLoginModal()">
        <div class="current-user-avatar" id="currentUserAvatar"></div>
        <div class="current-user-info">
          <span class="current-user-name" id="currentUserName">접속자 선택</span>
          <span class="current-user-role" id="currentUserRole">클릭하여 변경</span>
        </div>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:#64748b">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </div>
      <button class="manage-btn" style="display:none" onclick="openMembersPage()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        부서원 관리
      </button>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main">

    <!-- 상단바 -->
    <header class="topbar">
      <div class="topbar-left">
        <!-- 전체 보기일 때 -->
        <div id="headerAll" class="header-view">
          <h1 class="page-title">전체 보기</h1>
        </div>
        <!-- 부서원 뷰일 때 -->
        <div id="headerMember" class="header-view" style="display:none">
          <div id="memberAvatarHeader" class="avatar-circle" style="width:38px;height:38px;font-size:15px;"></div>
          <div>
            <h1 class="page-title" id="memberNameHeader"></h1>
            <span class="member-role-header" id="memberRoleHeader"></span>
          </div>
        </div>
        <!-- 부서원 관리 페이지 -->
        <div id="headerManage" class="header-view" style="display:none">
          <h1 class="page-title">부서원 관리</h1>
        </div>
      </div>

      <div class="topbar-right">
        <!-- 월 이동 (전체 보기용) -->
        <div class="month-nav" id="monthNav" style="display:none">
          <button class="month-btn" onclick="changeMonth(-1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span class="month-label" id="monthLabel"></span>
          <button class="month-btn" onclick="changeMonth(1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

        <!-- 연도 이동 (개인 뷰용) -->
        <div class="month-nav" id="yearNav" style="display:none">
          <button class="month-btn" onclick="changeYear(-1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span class="month-label" id="yearLabel"></span>
          <button class="month-btn" onclick="changeYear(1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>

        <!-- 업무 추가 버튼 (개인 뷰에서만, 사용 안 함 - 각 월 섹션에 있음) -->
        <button class="btn btn-primary" id="addTaskBtn" style="display:none" onclick="openTaskModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          업무 추가
        </button>

        <!-- 부서원 추가 버튼 (관리 페이지에서만) -->
        <button class="btn btn-primary" id="addMemberBtn" style="display:none" onclick="openMemberModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          부서원 추가
        </button>
      </div>
    </header>

    <!-- 콘텐츠 -->
    <div class="content">

      <!-- 전체 보기 -->
      <section id="view-all" class="view active">

        <!-- 공지 패널 -->
        <div class="notice-panel" id="noticePanel">
          <div class="notice-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/>
              <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
            </svg>
            <span class="notice-label">작성 안내</span>
            <button class="notice-edit-btn" id="noticeEditBtn" onclick="toggleNoticeEdit()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              편집
            </button>
          </div>
          <!-- 보기 모드 -->
          <div class="notice-content" id="noticeContent"></div>
          <!-- 편집 모드 -->
          <div class="notice-edit-area" id="noticeEditArea" style="display:none">
            <textarea id="noticeTextarea" rows="4" placeholder="부서원에게 안내할 내용을 입력하세요."></textarea>
            <div class="notice-edit-actions">
              <button class="btn btn-ghost btn-sm" onclick="cancelNoticeEdit()">취소</button>
              <button class="btn btn-primary btn-sm" onclick="saveNotice()">저장</button>
            </div>
          </div>
        </div>

        <!-- 사이트 패널 -->
        <div class="notice-panel sites-panel">
          <div class="notice-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            <span class="notice-label">필수 사이트</span>
            <button class="notice-edit-btn" onclick="openSiteModal()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              추가
            </button>
          </div>
          <div class="sites-list" id="sitesList"></div>
        </div>

        <div class="all-grid" id="allGrid"></div>
      </section>

      <!-- 개인 업무 뷰 -->
      <section id="view-member" class="view" style="display:none">
        <div id="memberNoticeWrap"></div>
        <div id="memberSitesWrap"></div>
        <div class="member-tasks-wrap" id="memberTasksWrap"></div>
      </section>

      <!-- 부서원 관리 -->
      <section id="view-manage" class="view" style="display:none">
        <div class="members-grid" id="membersGrid"></div>
      </section>

    </div>
  </main>
</div>

<!-- 업무 모달 -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="taskModalTitle">업무 추가</h2>
      <button class="modal-close" onclick="closeTaskModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId" />
      <div class="form-group">
        <label>업무명 <span class="required">*</span></label>
        <input type="text" id="taskTitle" placeholder="업무명을 입력하세요" />
      </div>
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="taskDate" />
      </div>
      <div class="form-group">
        <label>메모</label>
        <textarea id="taskMemo" rows="3" placeholder="추가 내용을 입력하세요"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<!-- 부서원 모달 -->
<div class="modal-overlay" id="memberModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="memberModalTitle">부서원 추가</h2>
      <button class="modal-close" onclick="closeMemberModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="memberId" />
      <div class="form-group">
        <label>이름 <span class="required">*</span></label>
        <input type="text" id="memberName" placeholder="이름을 입력하세요" />
      </div>
      <div class="form-group">
        <label>직책</label>
        <input type="text" id="memberRole" placeholder="직책을 입력하세요" />
      </div>
      <div class="form-group">
        <label>연락처</label>
        <input type="tel" id="memberEmail" placeholder="연락처를 입력하세요" />
      </div>
      <div class="form-group">
        <label>아바타 색상</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMemberModal()">취소</button>
      <button class="btn btn-primary" onclick="saveMember()">저장</button>
    </div>
  </div>
</div>

<!-- 접속자 선택 모달 -->
<div class="modal-overlay" id="loginModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>접속자 선택</h2>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:#64748b;margin-bottom:4px">본인을 선택하세요.</p>
      <div class="login-member-list" id="loginMemberList"></div>
    </div>
  </div>
</div>

<!-- 사이트 모달 -->
<div class="modal-overlay" id="siteModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="siteModalTitle">사이트 추가</h2>
      <button class="modal-close" onclick="closeSiteModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="siteId" />
      <div class="form-group">
        <label>사이트명 <span class="required">*</span></label>
        <input type="text" id="siteName" placeholder="예) 사내 인트라넷" />
      </div>
      <div class="form-group">
        <label>URL <span class="required">*</span></label>
        <input type="text" id="siteUrl" placeholder="예) https://intranet.company.com" />
      </div>
      <div class="form-group">
        <label>설명</label>
        <input type="text" id="siteDesc" placeholder="간단한 설명 (선택)" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSiteModal()">취소</button>
      <button class="btn btn-primary" onclick="saveSite()">저장</button>
    </div>
  </div>
</div>

<!-- 부서원 추천 사이트 모달 -->
<div class="modal-overlay" id="memberSiteModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="memberSiteModalTitle">추천 사이트 추가</h2>
      <button class="modal-close" onclick="closeMemberSiteModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="memberSiteId" />
      <div class="form-group">
        <label>사이트명 <span class="required">*</span></label>
        <input type="text" id="memberSiteName" placeholder="예) 업무 매뉴얼" />
      </div>
      <div class="form-group">
        <label>URL <span class="required">*</span></label>
        <input type="text" id="memberSiteUrl" placeholder="예) https://example.com" />
      </div>
      <div class="form-group">
        <label>설명</label>
        <input type="text" id="memberSiteDesc" placeholder="간단한 설명 (선택)" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMemberSiteModal()">취소</button>
      <button class="btn btn-primary" onclick="saveMemberSite()">저장</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
